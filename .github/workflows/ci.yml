name: CI - El Buen Sabor Backend

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: el_buen_sabor_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      mongo:
        image: mongo:5.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd mongo
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Instalar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      # =========================
      # 🧪 UNIT TESTS (JEST)
      # =========================
      - name: Ejecutar Unit Tests
        run: npm run test:unit

      # =========================
      # 🌍 E2E TESTS (NEWMAN)
      # =========================
      - name: Ejecutar Tests E2E
        env:
          PORT: 3000
          MONGO_URI: mongodb://localhost:27017/el_buen_sabor_test
          DB_USERNAME: root
          DB_PASSWORD: root
          DB_DATABASE: el_buen_sabor_test
          DB_HOST: 127.0.0.1
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

        run: |
          # 1. Migraciones
          npx sequelize-cli db:migrate

          # 2. Seeds
          npx sequelize-cli db:seed:all

          # 3. Levantar servidor
          npm start &

          # 4. Esperar servidor
          npx wait-on http://127.0.0.1:3000/api-docs

          # 5. Instalar Newman
          npm install -g newman

          # 6. Ejecutar colección
          newman run tests/tests.json \
            -e tests/entorno.json \
            --reporters cli