name: CI - El Buen Sabor Backend

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: el_buen_sabor_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      # =========================
      # 🧪 UNIT TESTS (JEST)
      # =========================
      - name: Ejecutar Unit Tests
        run: npm run test:unit

      # =========================
      # 🗄️ SETUP BASE DE DATOS
      # =========================
      - name: Esperar MySQL
        run: |
          until mysqladmin ping -h 127.0.0.1 --silent; do
            echo 'Esperando MySQL...'
            sleep 2
          done

      - name: Ejecutar Migraciones
        env:
          DB_USERNAME: root
          DB_PASSWORD: root
          DB_DATABASE: el_buen_sabor_test
          DB_HOST: 127.0.0.1
          NODE_ENV: test
        run: npx sequelize-cli db:migrate

      - name: Ejecutar Seeds
        env:
          DB_USERNAME: root
          DB_PASSWORD: root
          DB_DATABASE: el_buen_sabor_test
          DB_HOST: 127.0.0.1
          NODE_ENV: test
        run: npx sequelize-cli db:seed:all

      # =========================
      # 🌍 E2E TESTS (NEWMAN)
      # =========================
      - name: Instalar Newman
        run: npm install -g newman

      - name: Levantar servidor en background
        env:
          PORT: 3000
          DB_USERNAME: root
          DB_PASSWORD: root
          DB_DATABASE: el_buen_sabor_test
          DB_HOST: 127.0.0.1
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          npm start > server.log 2>&1 &
          echo $! > server.pid

      - name: Esperar que el servidor esté listo
        run: npx wait-on http://127.0.0.1:3000/api-docs -t 60000

      - name: Ejecutar Tests E2E (Newman)
        run: |
          newman run tests/tests.json \
            -e tests/entorno.json \
            --working-dir . \
            --reporters cli

      - name: Mostrar logs del servidor (si falló)
        if: failure()
        run: cat server.log

      - name: Detener servidor
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi