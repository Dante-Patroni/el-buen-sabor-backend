<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor de Caja (Desarrollo)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    body {
      background: #f3f5f8;
    }

    .ticket-card {
      border-left: 5px solid #198754;
      box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.08);
    }

    .mono {
      font-family: "Consolas", "Courier New", monospace;
    }
  </style>
</head>

<body class="py-4">
  <main class="container">
    <section class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="h3 mb-0">Monitor de Caja</h1>
      <button id="btn-limpiar" class="btn btn-outline-secondary btn-sm">Limpiar historial</button>
    </section>

    <section id="estado-conexion" class="alert alert-danger">
      Desconectado del servidor
    </section>

    <section id="sin-tickets" class="text-center text-muted py-5">
      <h2 class="h5">Esperando tickets...</h2>
      <p class="mb-0">Cierra una mesa para visualizar el resumen de facturacion.</p>
    </section>

    <section id="tickets" class="row g-3"></section>
  </main>

  <script>
    const socket = io("http://localhost:3000");
    const estadoConexion = document.getElementById("estado-conexion");
    const tickets = document.getElementById("tickets");
    const sinTickets = document.getElementById("sin-tickets");
    const btnLimpiar = document.getElementById("btn-limpiar");

    /**
     * @description Formatea un valor numerico como moneda ARS.
     * @param {number} valor - Monto a formatear.
     * @returns {string} Monto con formato local.
     */
    function moneda(valor) {
      return new Intl.NumberFormat("es-AR", {
        style: "currency",
        currency: "ARS",
        maximumFractionDigits: 2
      }).format(Number(valor || 0));
    }

    /**
     * @description Renderiza los items facturados de un pedido.
     * @param {Array<object>} items - Items del pedido.
     * @returns {string} HTML de filas de tabla.
     */
    function renderItems(items) {
      return items.map((item) => `
        <tr>
          <td>${item.plato}</td>
          <td class="text-end">${item.cantidad}</td>
          <td class="text-end">${moneda(item.precioUnitario)}</td>
          <td class="text-end">${moneda(item.subtotal)}</td>
        </tr>
      `).join("");
    }

    /**
     * @description Renderiza los pedidos incluidos en un ticket.
     * @param {Array<object>} pedidos - Pedidos facturados.
     * @returns {string} Bloque HTML de pedidos.
     */
    function renderPedidos(pedidos) {
      return pedidos.map((pedido) => `
        <div class="mb-3">
          <div class="d-flex justify-content-between align-items-center">
            <strong>Pedido #${pedido.pedidoId}</strong>
            <span class="badge bg-secondary">${pedido.cliente || "Anonimo"}</span>
          </div>
          <div class="table-responsive mt-2">
            <table class="table table-sm table-bordered align-middle">
              <thead class="table-light">
                <tr>
                  <th>Plato</th>
                  <th class="text-end">Cant.</th>
                  <th class="text-end">P. Unit.</th>
                  <th class="text-end">Subtotal</th>
                </tr>
              </thead>
              <tbody>
                ${renderItems(pedido.items || [])}
              </tbody>
            </table>
          </div>
          <p class="text-end fw-semibold mb-0">Total pedido: ${moneda(pedido.totalPedido)}</p>
        </div>
      `).join("");
    }

    /**
     * @description Agrega un ticket al inicio del historial visual.
     * @param {object} ticket - Payload de `ticket-generado`.
     * @returns {void} Solo efectos de UI.
     */
    function agregarTicket(ticket) {
      sinTickets.style.display = "none";

      const fecha = ticket.fechaCierre
        ? new Date(ticket.fechaCierre).toLocaleString()
        : new Date().toLocaleString();

      const html = `
        <article class="col-12">
          <div class="card ticket-card">
            <div class="card-header d-flex justify-content-between align-items-center">
              <div>
                <strong>Ticket Mesa ${ticket.mesaId}</strong>
                <div class="small text-muted mono">${fecha}</div>
              </div>
              <span class="badge text-bg-success">CERRADA</span>
            </div>
            <div class="card-body">
              ${renderPedidos(ticket.pedidos || [])}
            </div>
            <div class="card-footer">
              <div class="row">
                <div class="col-md-4"><strong>Subtotal:</strong> ${moneda(ticket.subtotal)}</div>
                <div class="col-md-4"><strong>IVA (${ticket.impuestos?.ivaPorcentaje || 0}%):</strong> ${moneda(ticket.impuestos?.ivaImporte || 0)}</div>
                <div class="col-md-4 text-md-end"><strong>Total Final:</strong> ${moneda(ticket.totalFinal)}</div>
              </div>
              <div class="row mt-1">
                <div class="col-md-6"><strong>Recargo:</strong> ${moneda(ticket.recargo)}</div>
                <div class="col-md-6 text-md-end"><strong>Descuento:</strong> ${moneda(ticket.descuento)}</div>
              </div>
            </div>
          </div>
        </article>
      `;

      tickets.insertAdjacentHTML("afterbegin", html);
    }

    socket.on("connect", () => {
      estadoConexion.className = "alert alert-success";
      estadoConexion.textContent = "Conectado. Escuchando tickets de caja en tiempo real.";
    });

    socket.on("disconnect", () => {
      estadoConexion.className = "alert alert-danger";
      estadoConexion.textContent = "Desconectado del servidor.";
    });

    socket.on("ticket-generado", (ticket) => {
      console.log("Ticket recibido:", ticket);
      agregarTicket(ticket);
    });

    btnLimpiar.addEventListener("click", () => {
      tickets.innerHTML = "";
      sinTickets.style.display = "block";
    });
  </script>
</body>

</html>
